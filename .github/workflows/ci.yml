name: CI
on:
  push:
    branches:
      - main

  pull_request:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./tools/github/actions/setup

      - name: Format check
        run: bun format

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./tools/github/actions/setup

      - name: Lint check
        run: bun lint --format=github

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./tools/github/actions/setup

      - name: Typecheck
        run: bun typecheck
