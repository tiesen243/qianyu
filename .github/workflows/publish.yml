name: Publish
on:
  push:
    tags:
      - '@qianyu/web@*.*.*'
      - '@qianyu/mobile@*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-web:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/@qianyu/web@')
    steps:
      - uses: actions/checkout@v6
      - uses: ./tools/github/actions/setup

      - name: Deploy to Production
        run: bun --filter @qianyu/infra deploy --stage prod
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}

          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}

  publish-apk:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/@qianyu/mobile@')
    env:
      APP_ROOT: apps/mobile
      QIANYU_UPLOAD_STORE_FILE: qianyu.keystore

    steps:
      - uses: actions/checkout@v6
      - uses: ./tools/github/actions/setup

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ !startsWith(github.ref, 'refs/tags/@qianyu/') }}
          cache-cleanup: never
          cache-overwrite-existing: true
      - name: Fix Gradle wrapper permissions
        run: chmod +x $APP_ROOT/android/gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.QIANYU_UPLOAD_STORE_BASE64 }}" | base64 --decode > $APP_ROOT/android/app/$QIANYU_UPLOAD_STORE_FILE
      - name: Config Enviroment Variables
        run: |
          echo "QIANYU_UPLOAD_STORE_FILE=$QIANYU_UPLOAD_STORE_FILE" >> $APP_ROOT/android/gradle.properties
          echo "QIANYU_UPLOAD_KEY_ALIAS=${{ secrets.QIANYU_UPLOAD_KEY_ALIAS }}" >> $APP_ROOT/android/gradle.properties
          echo "QIANYU_UPLOAD_STORE_PASSWORD=${{ secrets.QIANYU_UPLOAD_STORE_PASSWORD }}" >> $APP_ROOT/android/gradle.properties
          echo "QIANYU_UPLOAD_KEY_PASSWORD=${{ secrets.QIANYU_UPLOAD_STORE_PASSWORD }}" >> $APP_ROOT/android/gradle.properties
          echo "API_URL=${{ secrets.API_URL }}" >> $APP_ROOT/.env

      - name: Build Android Application
        run: |
          cd $APP_ROOT/android
          ./gradlew assembleRelease --no-daemon --warning-mode all --build-cache

      - name: Rename artifact
        run: |
          VERSION=${GITHUB_REF_NAME#@qianyu/mobile@}
          cd $APP_ROOT/android/app/build/outputs/apk/release
          for file in *.apk; do
            mv "$file" "qianyu-$VERSION.apk"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/@qianyu/')
        with:
          files: ${{ env.APP_ROOT }}/android/app/build/outputs/apk/release/qianyu-*.apk
