name: 'Setup Project'
description: 'Checkouts repo, sets up bun and installs dependencies'
runs:
  using: 'composite'
  steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install Dependencies
      shell: bash
      run: bun ci
